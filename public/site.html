<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="红鞋烘焙蛋糕灵感库，用对象、场合、预算和风格快速挑选蛋糕。">
  <meta name="theme-color" content="#ffffff">
  <title>红鞋烘焙 · 蛋糕灵感库</title>
  <link rel="stylesheet" href="/styles.css?v=20260721-1">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#results" aria-label="红鞋烘焙首页">
      <span class="brand-mark" aria-hidden="true">R</span><span class="brand-name">红鞋烘焙</span>
    </a>
    <form class="top-search" id="searchForm" role="search">
      <span class="search-icon" aria-hidden="true"></span>
      <input id="q" type="search" placeholder="搜索蛋糕款式、场合或对象" autocomplete="off" aria-label="搜索蛋糕">
      <button id="searchBtn" type="submit">搜索</button>
    </form>
    <button class="nav-fav" id="favToggle" aria-pressed="false"><span aria-hidden="true">♡</span><span>我的收藏</span><b id="favCount">0</b></button>
  </header>

  <main>
    <section class="discovery" aria-label="蛋糕分类与搜索建议">
      <div class="category-strip" id="categoryList"></div>
      <div class="suggestion-strip" id="examples" aria-label="快捷搜索">
        <button data-q="适合小男孩的恐龙蛋糕">恐龙</button>
        <button data-q="女孩子的公主城堡蛋糕">公主</button>
        <button data-q="小学六年级毕业班级蛋糕">毕业季</button>
        <button data-q="给爷爷祝寿的中式蛋糕">长辈祝寿</button>
        <button data-q="情侣浪漫纪念日蛋糕">纪念日</button>
        <button data-q="公司开业大吉蛋糕">开业</button>
      </div>
    </section>

    <section class="results" id="results" aria-labelledby="resultsTitle">
      <div class="results-head">
        <div id="status" class="status"><strong id="resultsTitle">正在准备蛋糕图库…</strong></div>
        <div class="result-actions">
          <button class="toolbar-btn" id="filterOpen" type="button" aria-haspopup="dialog"><span aria-hidden="true">☷</span> 筛选 <b id="filterCount" hidden>0</b></button>
          <label class="sort-control"><span class="sr-only">排序</span><select id="sortBy"><option value="recommend">推荐排序</option><option value="priceAsc">价格从低到高</option><option value="priceDesc">价格从高到低</option></select></label>
        </div>
      </div>
      <div class="active-filters" id="activeFilters" hidden></div>
      <div class="grid" id="grid" aria-live="polite" aria-busy="true"></div>
      <div class="load-more" id="loadMore" hidden><span id="loadMoreStatus">继续向下浏览更多款式</span><button id="loadMoreBtn" type="button">加载更多</button></div>
      <div class="empty" id="empty" hidden><b>暂时没有找到合适的款式</b><span>试试减少筛选条件，或者换一种描述。</span><button id="emptyReset" type="button">清除筛选</button></div>
    </section>
  </main>

  <div class="sheet" id="filterSheet" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="filterTitle">
    <button class="sheet-backdrop" data-filter-close aria-label="关闭筛选"></button>
    <section class="sheet-panel">
      <header><div><span class="sheet-handle" aria-hidden="true"></span><h2 id="filterTitle">筛选蛋糕</h2></div><button class="icon-close" data-filter-close aria-label="关闭筛选">×</button></header>
      <div class="filter-content">
        <fieldset><legend>价格预算</legend><div class="price-fields"><label>最低价<span><i>¥</i><input id="priceMin" type="number" min="0" inputmode="numeric" placeholder="不限"></span></label><em>—</em><label>最高价<span><i>¥</i><input id="priceMax" type="number" min="0" inputmode="numeric" placeholder="不限"></span></label></div></fieldset>
        <fieldset><legend>尺寸</legend><div class="choice-grid" id="sizes"></div></fieldset>
        <div class="select-grid"><label>场合<select id="occasionFilter"><option value="">全部场合</option><option>生日</option><option>毕业</option><option>祝寿</option><option>开业</option><option>纪念日</option><option>婚礼</option></select></label><label>送给谁<select id="targetFilter"><option value="">不限对象</option><option>男孩</option><option>女孩</option><option>儿童</option><option>老师</option><option>爷爷</option><option>奶奶</option><option>朋友</option></select></label></div>
      </div>
      <footer><button class="clear-btn" id="resetBtn" type="button">清除全部</button><button class="apply-btn" id="applyFilters" type="button">查看结果</button></footer>
    </section>
  </div>

  <div class="detail" id="modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="detailTitle">
    <button class="detail-backdrop" data-close aria-label="关闭详情"></button>
    <article class="detail-card">
      <header class="detail-nav"><button class="detail-back" data-close aria-label="返回蛋糕列表">‹</button><p id="mBarcode"></p><button class="detail-share" id="shareBtn" aria-label="分享款式">↗</button></header>
      <div class="detail-scroll">
        <div class="detail-hero"><img id="mImg" alt="蛋糕大图"></div>
        <div class="detail-info">
          <div class="detail-top"><div><h2 id="detailTitle"><small>¥</small><span id="mPrice"></span></h2><p id="mServing"></p></div><button id="mFav" class="detail-fav">♡ 收藏</button></div>
          <div id="mHighlights" class="highlight-tags"></div>
          <p class="detail-summary" id="mDesc"></p>
          <details class="detail-more">
            <summary><span><b>查看完整款式资料</b><small>规格预算、适用对象、风格与外观细节</small></span><i aria-hidden="true">⌄</i></summary>
            <div class="detail-sections">
              <section><h3><b class="a">A</b>规格预算</h3><div class="spec-line" id="mSpec"></div></section>
              <section><h3><b class="b">B</b>送谁 · 场合</h3><div class="detail-row"><strong>送谁</strong><div id="mTargets" class="tags"></div></div><div class="detail-row"><strong>场合</strong><div id="mOccasions" class="tags"></div></div></section>
              <section><h3><b class="c">C</b>主题风格</h3><div id="mThemes" class="tags"></div></section>
              <section><h3><b class="d">D</b>外观细节</h3><dl><div><dt>形状</dt><dd id="mShape"></dd></div><div><dt>颜色</dt><dd id="mColors" class="tags"></dd></div><div><dt>装饰</dt><dd id="mDecor"></dd></div><div><dt>花卉 / IP</dt><dd id="mExtra"></dd></div></dl></section>
            </div>
          </details>
          <section class="related"><h2>相似蛋糕推荐</h2><div class="related-grid" id="relatedGrid"></div></section>
        </div>
      </div>
      <button class="copy-btn" id="copyBarcode">复制款式编号</button>
    </article>
  </div>

  <div class="toast" id="toast" hidden role="status"></div>
  <script src="/app.js?v=20260721-1" defer></script>
</body>
</html>
